<div class="auth-layout">
  <div class="auth-card">
    <div class="brand-header">
      <div class="logo-icon"><mat-icon>business_center</mat-icon></div>
      <span class="brand-name">LeaveSync</span>
    </div>

    <div [hidden]="emailSent">
      <div class="header">
        <h2>Forgot password?</h2>
        <p>No worries, we'll send you reset instructions.</p>
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" formControlName="email" placeholder="name@company.com">
        </div>

        <button type="submit" class="submit-btn" 
                [disabled]="isSubmitting" 
                [class.btn-invalid]="forgotForm.invalid">
          {{ isSubmitting ? 'Sending...' : 'Send reset link' }}
        </button>
      </form>
    </div>

    <div [hidden]="!emailSent" class="success-state">
      <div class="success-icon"><mat-icon>mark_email_read</mat-icon></div>
      <h2>Check your email</h2>
      <p>We sent a password reset link to <br><strong>{{ forgotForm.get('email')?.value }}</strong></p>
    </div>

    <div class="footer-links">
      <a routerLink="/login" class="back-link"><mat-icon>arrow_back</mat-icon> Back to log in</a>
    </div>
  </div>
</div>
