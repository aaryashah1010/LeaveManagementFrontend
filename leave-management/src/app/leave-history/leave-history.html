<div class="container">

    <h2>Leave History</h2>

    <table>

        <thead>
            <tr>
                <th>Type</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Days</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>

            <tr *ngFor="let leave of leaves">

                <td>{{ leave.leave_type }}</td>

                <td>{{ leave.start_date | date }}</td>

                <td>{{ leave.end_date | date }}</td>

                <td>{{ leave.days }}</td>

                <td>{{ leave.status }}</td>

            </tr>

        </tbody>

    </table>

</div>
