<div class="auth-layout">
    <div class="auth-card">
        <div class="brand-header">
            <div class="logo-icon"><mat-icon>business_center</mat-icon></div>
            <span class="brand-name">LeaveSync</span>
        </div>

        <div class="header">
            <h2>Set new password</h2>
            <p>Your new password must be different from previously used passwords.</p>
        </div>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label>New Password</label>
                <div class="password-input-wrapper">
                    <input [type]="hidePassword ? 'password' : 'text'" formControlName="newPassword"
                        placeholder="••••••••">
                    <button type="button" class="icon-btn" (click)="toggleVisibility()">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" formControlName="confirmPassword" placeholder="••••••••">
                <div class="error-msg"
                    *ngIf="resetForm.errors?.['mismatch'] && resetForm.get('confirmPassword')?.touched">
                    Passwords do not match.
                </div>
            </div>

            <button type="submit" class="submit-btn" [disabled]="resetForm.invalid || !token">
                Reset password
            </button>
        </form>

        <div class="footer-links">
            <a routerLink="/login" class="back-link"><mat-icon>arrow_back</mat-icon> Back to log in</a>
        </div>
    </div>
</div>
